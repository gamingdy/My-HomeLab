---
name: Octodns

on:
    push:
        branches: [dns]
        paths:
            - octodns/**

env:
    OVH_APPLICATION_KEY: ${{ secrets.OVH_OCTODNS_APPLICATION_KEY }}
    OVH_APPLICATION_SECRET: ${{ secrets.OVH_OCTODNS_APPLICATION_SECRET }}
    OVH_CONSUMER_KEY: ${{ secrets.OVH_OCTODNS_CONSUMER_KEY }}

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r octodns/requirements.txt
            - name: Validate octodns config
              run: |
                  octodns-validate --config-file=./octodns/config/config.yaml
    deploy:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/dns'
        needs: [lint]
        steps:
            - uses: actions/checkout@v3
            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r octodns/requirements.txt
            - name: Apply octodns config
              run: |
                  octodns-sync --config-file=./octodns/config/config.yaml --doit
